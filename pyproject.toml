[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "scentree-gen"
version = "0.0.1"
description = "A python package implementing scenario tree generation process"
readme = "README.md"
license = {file = "LICENSE"}
classifiers = [
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)"
]
requires-python = ">=3.12"
dependencies = [
    "matplotlib==3.10.5",
    "numpy==2.3.3",
    "pydantic==2.5.3",
]

[project.optional-dependencies]
dev = [
    "black==23.11",
    "flake8==6.1.0",
    "ipykernel==6.30.1",
    "pdbpp==0.11.5",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["scentree_gen*"]

[tool.black]
line-length = 100
skip-string-normalization = false